<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analysis Result | CropAI</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.25);
            --border: rgba(255, 255, 255, 0.3);
            --success-bg: rgba(76, 175, 80, 0.2);
            --warning-bg: rgba(255, 152, 0, 0.2);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1d976c, #93f9b9); /* Fresh Green Gradient */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            color: #2c3e50;
        }

        .result-box {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 25px;
            padding: 40px;
            width: 450px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            transition: transform 0.3s ease;
        }

        h1 { margin-top: 0; font-weight: 600; font-size: 1.8rem; }

        /* Conditional Styling based on the Status variable */
        .status-msg {
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0;
            font-weight: 500;
        }
        .success-box { background: var(--success-bg); border-left: 5px solid #4CAF50; }
        .warning-box { background: var(--warning-bg); border-left: 5px solid #FF9800; }

        hr { border: 0; height: 1px; background: rgba(255,255,255,0.4); margin: 30px 0; }

        h3 { font-size: 1.1rem; margin-bottom: 15px; opacity: 0.9; }

        select {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.8);
            font-size: 1rem;
            outline: none;
            cursor: pointer;
            margin-bottom: 20px;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #2d3436;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        button:hover {
            background: #000;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
        }

        .predicted-label {
            font-weight: bold;
            color: #1b5e20;
            background: rgba(255,255,255,0.5);
            padding: 2px 8px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="result-box">
        <h1>🌱 Crop Analysis</h1>
        
        <div class="status-msg {{ 'success-box' if status == 'success' else 'warning-box' }}">
            {{ message }}
        </div>

        <hr>

        <h3>Step 2: Irrigation Check</h3>
        <p style="font-size: 0.9rem; margin-bottom: 20px; color: #555;">
            Select how you plan to water your <span class="predicted-label">{{ predicted.capitalize() }}</span>:
        </p>

        <form action="/check_irrigation" method="POST">
            <input type="hidden" name="predicted_crop" value="{{ predicted }}">
            
            <select name="irrigation_type" required>
                <option value="" disabled selected>Choose irrigation type...</option>
                <option value="Drip Irrigation">💧 Drip Irrigation</option>
                <option value="Sprinkler Irrigation">🚿 Sprinkler Irrigation</option>
                <option value="Flood Irrigation">🌊 Flood Irrigation</option>
                <option value="Furrow Irrigation">🚜 Furrow Irrigation</option>
                <option value="Drip Irrigation">🌿 Micro-Irrigation</option>
            </select>
            
            <button type="submit">Verify Suitability</button>
        </form>
    </div>

</body>
</html>
